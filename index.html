<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TemuClav | Links</title>
  <meta name="description" content="Donate to my Paypal to support my unfiltered content." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #050505;
      --text: #f3f3f3;
      --muted: #bcbcbc;
      --bar-text: #0f0f10;
      --bar-border: rgba(255,255,255,0.14);
      --shadow: rgba(0,0,0,0.32);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      background: #000;
      color: var(--text);
      font-family: "DM Sans", Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      display: flex;
      justify-content: center;
      padding: 18px 18px 42px;
      background:
        radial-gradient(circle at 50% 0%, rgba(22, 30, 48, 0.88) 0%, rgba(8, 10, 14, 0.96) 26%, rgba(0, 0, 0, 0.98) 52%, #000 78%),
        #000;
    }

    .page {
      width: 100%;
      max-width: 760px;
    }

    .profile {
      text-align: center;
      margin-bottom: 20px;
    }

    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 999px;
      object-fit: cover;
      object-position: center 22%;
      display: block;
      margin: 0 auto 16px;
      background: #1f2024;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 12px 30px rgba(0,0,0,0.38);
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1.05;
      letter-spacing: -0.05em;
      font-weight: 800;
    }

    .bio {
      margin: 12px auto 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.5;
      font-weight: 500;
      word-break: break-word;
    }

    .icon-row {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 28px;
      margin: 22px 0 28px;
    }

    .icon-link {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.97);
      text-decoration: none;
      transition: transform 0.18s ease, opacity 0.18s ease;
      opacity: 0.96;
      touch-action: manipulation;
      cursor: pointer;
    }

    .icon-link:hover {
      transform: translateY(-1px) scale(1.05);
      opacity: 1;
    }

    .icon-link svg {
      width: 100%;
      height: 100%;
      display: block;
      fill: currentColor;
      pointer-events: none;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .card {
      position: relative;
      display: block;
      text-decoration: none;
      color: var(--bar-text);
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid var(--bar-border);
      box-shadow: 0 10px 28px var(--shadow);
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03) 35%, rgba(0,0,0,0.08) 100%),
        linear-gradient(90deg, #3f3f41 0%, #4b4b4d 18%, #444446 50%, #38383a 100%);
      touch-action: manipulation;
      cursor: pointer;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background-image: radial-gradient(rgba(255,255,255,0.9) 0.45px, transparent 0.6px);
      background-size: 6px 6px;
      mix-blend-mode: soft-light;
    }

    .card:hover {
      transform: translateY(-1px);
      transition: transform 0.18s ease;
    }

    .card-row {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 34px;
      min-height: 108px;
    }

    .title {
      font-size: 0.96rem;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: #0c0c0d;
      text-align: center;
      pointer-events: none;
    }

    .menu-dots {
      position: absolute;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.72;
      pointer-events: none;
    }

    .menu-dots span {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #111;
      box-shadow: 0 -7px 0 #111, 0 7px 0 #111;
      display: block;
    }

    .footer-space {
      height: 8px;
    }

    @media (max-width: 640px) {
      body {
        padding: 14px 12px 30px;
      }

      .avatar {
        width: 94px;
        height: 94px;
      }

      h1 {
        font-size: 1.75rem;
      }

      .bio {
        font-size: 0.93rem;
      }

      .icon-row {
        gap: 24px;
      }

      .icon-link {
        width: 38px;
        height: 38px;
      }

      .card {
        border-radius: 20px;
      }

      .card-row {
        min-height: 92px;
        padding: 0 30px;
      }

      .menu-dots {
        right: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="profile">
      <img class="avatar" src="avatar.jpg" alt="TemuClav profile picture" />
      <h1>@temu.clav</h1>
      <p class="bio">Donate to my Paypal to support my unfiltered content (https://www.paypal.com/paypalme/temuclav).</p>

      <div class="icon-row">
        <a class="icon-link" href="https://www.tiktok.com/@temu.clav" onclick="window.location.assign('https://www.tiktok.com/@temu.clav'); return false;" aria-label="TikTok">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M14.6 2h2.8c.3 2.3 1.8 4.2 4 4.9v2.9c-1.7 0-3.3-.5-4.7-1.4v6.3c0 3.7-3 6.7-6.7 6.7s-6.7-3-6.7-6.7S6.3 8 10 8c.3 0 .7 0 1 .1V11a4 4 0 1 0 2.6 3.7V2Z"/>
          </svg>
        </a>

        <a class="icon-link" href="https://www.paypal.com/paypalme/temuclav" onclick="window.location.assign('https://www.paypal.com/paypalme/temuclav'); return false;" aria-label="PayPal">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8.2 3h7.1c2.9 0 5 1.2 5 4.2 0 3.7-2.7 5.8-6.5 5.8h-2.6l-.8 4.8H6.7L8.2 3Zm3.4 7.3h2.1c1.7 0 3.1-.7 3.1-2.5 0-1.3-1-1.8-2.4-1.8h-2.7l-.5 4.3Z"/>
            <path d="M7.1 7.5H12c2.1 0 3.7.9 3.7 3.2 0 3-2.1 4.7-5 4.7H8.8l-.7 4.1H4.8L7.1 7.5Z" opacity="0.85"/>
          </svg>
        </a>

        <a class="icon-link" href="https://www.patreon.com/c/TemuClav" onclick="window.location.assign('https://www.patreon.com/c/TemuClav'); return false;" aria-label="Patreon">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M15.8 2.2A6.8 6.8 0 1 1 9 9a6.8 6.8 0 0 1 6.8-6.8ZM3 3.2h3.6V21H3Z"/>
          </svg>
        </a>
      </div>
    </section>

    <section class="links">
      <a class="card" href="https://www.tiktok.com/@temu.clav" onclick="window.location.assign('https://www.tiktok.com/@temu.clav'); return false;" aria-label="TikTok">
        <div class="card-row">
          <div class="title">TikTok</div>
          <div class="menu-dots" aria-hidden="true"><span></span></div>
        </div>
      </a>

      <a class="card" href="https://www.paypal.com/paypalme/temuclav" onclick="window.location.assign('https://www.paypal.com/paypalme/temuclav'); return false;" aria-label="PayPal.me">
        <div class="card-row">
          <div class="title">PayPal.me</div>
          <div class="menu-dots" aria-hidden="true"><span></span></div>
        </div>
      </a>

      <a class="card" href="https://www.patreon.com/c/TemuClav" onclick="window.location.assign('https://www.patreon.com/c/TemuClav'); return false;" aria-label="Patreon">
        <div class="card-row">
          <div class="title">Patreon</div>
          <div class="menu-dots" aria-hidden="true"><span></span></div>
        </div>
      </a>
    </section>

    <div class="footer-space"></div>
  </main>
</body>
</html>
